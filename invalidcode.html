<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invalid Code</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f3f5f7;
    --card: #ffffff;
    --text: #23364a;
    --muted: #6d7a88;
    --line: #d9e1e8;
    --accent: #00b3ad;
    --accent-dark: #00918c;
    --shadow: 0 16px 44px rgba(35, 54, 74, 0.12);
    --radius: 8px;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Lato", "Segoe UI", sans-serif;
    color: var(--text);
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.7)),
      var(--bg);
    display: grid;
    place-items: center;
    padding: 24px;
  }

  .page {
    width: 100%;
    max-width: 440px;
  }

  .card {
    background: var(--card);
    border: 1px solid #e7edf2;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 36px 32px 30px;
    text-align: center;
  }

  .brand {
    display: block;
    margin-bottom: 18px;
    color: var(--accent-dark);
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .badge {
    width: 72px;
    height: 72px;
    margin: 0 auto 18px;
    border-radius: 999px;
    display: grid;
    place-items: center;
    background: rgba(35, 54, 74, 0.08);
    color: var(--text);
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 0.08em;
  }

  h1 {
    margin: 0 0 12px;
    font-size: 34px;
    line-height: 1.05;
    font-weight: 900;
  }

  p {
    margin: 0 auto 24px;
    max-width: 300px;
    color: var(--muted);
    line-height: 1.6;
    font-size: 14px;
  }

  .button {
    display: inline-block;
    border-radius: 4px;
    padding: 14px 18px;
    font-size: 16px;
    font-weight: 900;
    color: white;
    background: var(--accent);
    text-decoration: none;
  }

  .button:hover {
    background: var(--accent-dark);
  }
</style>
</head>
<body>
  <main class="page">
    <section class="card">
      <span class="brand">TwoNav</span>
      <div class="badge">CODE</div>
      <h1>Invalid code</h1>
      <p>The code you entered does not seem to be valid. Please contact us at support.twonav.com</p>
      <a class="button" href="promocode.html">Try another code</a>
    </section>
  </main>
</body>
</html>
